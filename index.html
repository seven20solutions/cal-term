<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Am I Busy</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ff6acc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --gum-black: #030303;
        --gum-pink: #ff6acc;
        --gum-white: #f8f8f2;
        --gum-gray: #1b1b1f;
        --gum-purple: #ce00ff;
        --accent-shadow: 0 20px 35px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "SF Pro Display", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 20%, rgba(255, 106, 204, 0.18), transparent 40%),
          radial-gradient(circle at 80% 0%, rgba(0, 192, 255, 0.13), transparent 35%),
          #030303;
        color: var(--gum-white);
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .app-shell {
        width: min(1100px, 100%);
        background: var(--gum-black);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: var(--accent-shadow);
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        position: relative;
        max-height: calc(100vh - 2rem);
      }

      .app-shell::before,
      .app-shell::after {
        content: "";
        position: absolute;
        width: 60%;
        height: 60%;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(255, 106, 204, 0.35), rgba(255, 255, 255, 0));
        pointer-events: none;
        filter: blur(15px);
      }

      .app-shell::before {
        top: -20%;
        right: -10%;
      }

      .app-shell::after {
        bottom: -10%;
        left: -5%;
        background: linear-gradient(135deg, rgba(0, 192, 255, 0.2), rgba(255, 255, 255, 0));
      }

      .terminal-body {
        padding: 1.5rem 2rem 2rem;
        display: flex;
        flex-direction: row;
        gap: 1.5rem;
        flex: 1;
        margin-bottom: 0.5rem;
        min-height: 0;
      }

      .terminal-canvas {
        flex: 1;
        background: #050505;
        border-radius: 20px;
        box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.02);
        padding: 1rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        min-height: 0;
      }

      .terminal-history {
        flex: 1;
        overflow-y: auto;
        padding-right: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        padding-bottom: 0.5rem;
      }

      .terminal-history:focus {
        outline: none;
        box-shadow: 0 0 0 8px rgba(0, 0, 0, 0.55);
      }

      .prompt-line {
        font-size: 0.95rem;
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }

      .prompt-line strong {
        color: var(--gum-pink);
        font-weight: 600;
      }

      .terminal-line {
        display: block;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .terminal-input {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.8rem;
        align-items: center;
          border-top: 1px solid rgba(255, 255, 255, 0.1);
          padding-top: 0.8rem;
          position: sticky;
          bottom: 0;
          background: linear-gradient(180deg, rgba(5, 5, 5, 0.9), #050505);
          padding-bottom: 0.8rem;
          z-index: 1;
        }

        .mobile-toolbar {
          display: none;
          position: fixed;
          bottom: calc(1rem + 3.5rem);
          left: 1rem;
          right: 1rem;
          padding: 0.4rem 0.6rem;
          gap: 0.35rem;
          background: rgba(3, 3, 3, 0.9);
          border: 1px solid rgba(255, 255, 255, 0.12);
          border-radius: 999px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
          justify-content: center;
          align-items: center;
          z-index: 10;
        }

        .mobile-toolbar button {
          border: none;
          background: rgba(255, 255, 255, 0.08);
          color: var(--gum-white);
          font-family: inherit;
          font-size: 0.95rem;
          padding: 0.6rem 1rem;
          border-radius: 999px;
          cursor: pointer;
          transition: background 0.2s ease;
          min-width: 54px;
          flex: 0 0 auto;
          text-align: center;
        }

        .mobile-toolbar button:hover {
          background: rgba(255, 106, 204, 0.2);
        }

      .edit-hint,
      .event-footer {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.7);
      }
      .event-footer {
        position: sticky;
        bottom: 0;
        padding: 0.5rem 1rem;
        background: rgba(3, 3, 3, 0.85);
        backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        min-height: 2.5rem;
      }

      @media (max-width: 640px) {
        .mobile-toolbar {
          display: flex;
          overflow-x: auto;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
          justify-content: flex-start;
          padding-left: 0.25rem;
        }
        .mobile-toolbar::-webkit-scrollbar {
          display: none;
        }
        .terminal-input {
          padding-bottom: 1.8rem;
          transition: transform 0.25s ease;
        }
        .terminal-input.focused {
          transform: translateY(-90px);
        }
        .terminal-canvas {
          padding: 1rem 0;
        }
        .edit-hint {
          margin-top: 0.5rem;
          font-size: 0.85rem;
          color: rgba(255, 255, 255, 0.65);
          display: none;
        }
      }

      .terminal-input span {
        color: var(--gum-pink);
        font-weight: 600;
        letter-spacing: 0.08em;
      }

      .terminal-input input {
        background: transparent;
        border: none;
        color: var(--gum-white);
        font-size: 1rem;
        font-family: inherit;
        outline: none;
        min-width: 0;
      }



      .event-card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 0.6rem 0.9rem;
        background: rgba(255, 255, 255, 0.02);
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .day-divider {
        font-size: 0.95rem;
        letter-spacing: 0.15rem;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        padding-bottom: 0.2rem;
        margin-top: 0.9rem;
      }

      .event-card .event-title {
        font-weight: 600;
        color: var(--gum-white);
        font-size: 0.97rem;
      }

      .event-card .event-time {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.7);
      }

      .event-card .event-desc {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.65);
        display: none;
        white-space: normal;
        word-break: break-word;
        margin-top: 0.5rem;
      }

      .event-card.expanded .event-desc {
        display: block;
      }

      .calendar-tint-0 {
        background: linear-gradient(145deg, rgba(102, 153, 255, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-1 {
        background: linear-gradient(145deg, rgba(18, 18, 18, 0.55), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-2 {
        background: linear-gradient(145deg, rgba(0, 180, 125, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-3 {
        background: linear-gradient(145deg, rgba(187, 33, 162, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-4 {
        background: linear-gradient(145deg, rgba(164, 13, 150, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-5 {
        background: linear-gradient(145deg, rgba(141, 4, 138, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-6 {
        background: linear-gradient(145deg, rgba(115, 0, 120, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-7 {
        background: linear-gradient(145deg, rgba(99, 0, 110, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-8 {
        background: linear-gradient(145deg, rgba(80, 0, 95, 0.35), rgba(5, 5, 5, 0.95));
      }
      .calendar-tint-9 {
        background: linear-gradient(145deg, rgba(60, 0, 75, 0.35), rgba(5, 5, 5, 0.95));
      }

      .event-card.selected {
        border-color: var(--gum-pink);
        box-shadow: 0 0 0 2px rgba(255, 106, 204, 0.25);
        transform: translateY(-1px);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0.2rem 0.65rem;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.85);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.3rem 0.8rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .calendar-picker {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 0.7rem;
        background: rgba(255, 255, 255, 0.02);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .calendar-picker-label {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .calendar-pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .calendar-pill {
        border: 0;
        background: rgba(255, 255, 255, 0.08);
        color: var(--gum-white);
        padding: 0.4rem 0.9rem;
        border-radius: 999px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        transition: background 0.2s ease;
      }

      .calendar-pill:hover {
        background: rgba(255, 106, 204, 0.2);
      }

      @media (max-width: 860px) {
        body {
          padding: 1rem;
        }

        .terminal-body {
          flex-direction: column;
        }
      }

      @media (max-width: 600px) {
        header,
        .terminal-body {
          padding: 1.1rem;
        }

        .terminal-input {
          flex-direction: column;
          align-items: flex-start;
        }

        .terminal-input span {
          letter-spacing: 0.05em;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="terminal-body">
        <div class="terminal-canvas">
        <div class="terminal-history" id="history"></div>
        <form class="terminal-input" id="terminal-form">
          <span id="prompt-label"></span>
          <div style="display:flex;align-items:center;gap:0.4rem;">
            <input
              type="text"
              id="command-input"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="type a command"
            />
          </div>
        </form>
        <div class="edit-hint" id="edit-hint" aria-live="polite"></div>
        <div class="event-footer" id="event-footer" aria-live="polite"></div>
        <div class="mobile-toolbar" id="mobile-toolbar">
          <button type="button" data-shortcut="ls">ls</button>
          <button type="button" data-shortcut="w">w</button>
          <button type="button" data-shortcut="m">m</button>
          <button type="button" data-shortcut="j">j</button>
          <button type="button" data-shortcut="k">k</button>
          <button type="button" data-shortcut="ESC">ESC</button>
          <button type="button" data-shortcut="G">G</button>
          <button type="button" data-shortcut="gg">gg</button>
          <button type="button" data-shortcut="e">e</button>
          <button type="button" data-shortcut="a">a</button>
        </div>
      </div>
    </div>
    </div>

    <script>
      const SCOPE = "https://www.googleapis.com/auth/calendar.readonly";
      const STORAGE_KEY = "amib_busy_tokens";
      const CLIENT_ID_KEY = "amib_busy_client_id";
      const CLIENT_SECRET_KEY = "amib_busy_client_secret";
      const VERIFIER_KEY = "amib_busy_pkce_verifier";
      const STATE_KEY = "amib_busy_oauth_state";
      const redirectUri = `${window.location.origin}${window.location.pathname}`;

        const historyEl = document.getElementById("history");
        const promptLabel = document.getElementById("prompt-label");
        const form = document.getElementById("terminal-form");
        const input = document.getElementById("command-input");
        const editHint = document.getElementById("edit-hint");
        const eventFooter = document.getElementById("event-footer");
      const defaultPlaceholder = input.placeholder;
      const terminalInputWrapper = document.querySelector(".terminal-input");

      const commands = {
        auth: handleAuth,
        ls: () => {
          pendingFocusHistory += 1;
          return fetchEventsRange("Today", rangeToday());
        },
        w: () => {
          pendingFocusHistory += 1;
          return fetchEventsRange("Next 7 Days", rangeNextDays(7));
        },
        m: () => {
          pendingFocusHistory += 1;
          return fetchEventsRange("This Month", rangeMonth(0));
        },
        "+1": () => fetchEventsRange("Next Month", rangeMonth(1)),
        "+2": () => fetchEventsRange("Following Month", rangeMonth(2)),
        cals: listCalendars,
        clear: clearHistory,
        status: showStatus,
        help: showHelp,
        upgrade: handleUpgrade,
      };
      let awaitingClientId = false;
      let awaitingClientSecret = false;
      const commandHistory = [];
      let historyIndex = -1;
      let pendingEvent = null;
      let calendarSelectorEl = null;
      let lastRenderedEvents = [];
      let selectedEvent = null;
      let pendingRestoreEventId = null;
      let pendingFocusHistory = 0;
      const calendarTintMap = new Map();
      const tintCount = 10;

      updatePrompt();
      handleOAuthCallback();
      renderStartupMessage();
      const ensureFocus = () => {
        input.focus();
        setTimeout(() => input.focus(), 50);
        handleShortcut("ESC");
      };
      ensureFocus();
      window.addEventListener("load", ensureFocus);
      window.addEventListener("resize", updatePrompt);
      setInterval(() => {
        updatePrompt();
      }, 1000);

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const rawCommand = input.value;
        input.value = "";
        if (awaitingClientId) {
          handleClientIdInput(rawCommand);
          return;
        }
        if (awaitingClientSecret) {
          handleClientSecretInput(rawCommand);
          return;
        }
        const trimmed = rawCommand.trim();
        if (!trimmed) {
          return;
        }
        executeCommand(trimmed);
      });

      input.addEventListener("focus", () => {
        terminalInputWrapper.classList.add("focused");
      });

      input.addEventListener("blur", () => {
        terminalInputWrapper.classList.remove("focused");
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Tab") {
          event.preventDefault();
          focusHistory();
          return;
        }
        if (event.key !== "ArrowUp" && event.key !== "ArrowDown") {
          return;
        }
        if (!commandHistory.length) {
          return;
        }
        event.preventDefault();
        if (historyIndex === -1) {
          historyIndex = commandHistory.length;
        }
        if (event.key === "ArrowUp") {
          historyIndex = Math.max(0, historyIndex - 1);
        } else {
          historyIndex = Math.min(commandHistory.length - 1, historyIndex + 1);
        }
        if (historyIndex === commandHistory.length) {
          input.value = "";
          return;
        }
        input.value = commandHistory[historyIndex];
      });

      function dispatchCommand(raw) {
        addHistoryPrompt(raw);
        if (raw.startsWith("a ")) {
          cancelAddEvent();
          handleAddCommand(raw.slice(2).trim());
          return;
        }
        if (raw.startsWith("e ")) {
          cancelAddEvent();
          handleEditCommand(raw.slice(2).trim());
          return;
        }
        cancelAddEvent();
        const [name] = raw.split(" ", 1);
        const command = commands[name];
        if (command) {
          command();
          return;
        }
        if (/^[0-9]+$/.test(raw)) {
          handleDateLookup(raw);
          return;
        }
        addHistoryLine("error", `Unknown command: ${name}`);
      }

      function handleClientIdInput(value) {
        const trimmed = value.trim();
        awaitingClientId = false;
        input.placeholder = defaultPlaceholder;
        const stored = getStoredClientId();
        if (!trimmed) {
          if (!stored) {
            addHistoryLine("error", "No Client ID stored yet. Paste it now to continue.");
            return;
          }
          addHistoryLine("log", "Using saved Client ID.");
        } else {
          saveClientId(trimmed);
          addHistoryLine("log", "Client ID saved locally.");
        }
        ensureSecretThenAuth();
      }

      function ensureSecretThenAuth() {
        const secret = getStoredClientSecret();
        if (!secret) {
          promptForClientSecret();
          return;
        }
        startAuthFlow();
      }

      function startAuthFlow() {
        addHistoryLine("log", "Starting OAuth flow...");
        initiatePkceFlow().catch((error) => {
          addHistoryLine("error", `Auth failed: ${error.message}`);
        });
      }

      function addHistoryLine(type, content) {
        const el = document.createElement("div");
        el.className = `terminal-line terminal-line--${type}`;
        el.innerHTML = content;
        historyEl.appendChild(el);
        historyEl.scrollTop = historyEl.scrollHeight;
      }

      function addHistoryPrompt(command) {
        const el = document.createElement("div");
        el.className = "prompt-line";
        el.innerHTML = `<strong>${promptLabel.textContent}</strong> ${escapeHtml(command)}`;
        historyEl.appendChild(el);
        historyEl.scrollTop = historyEl.scrollHeight;
      }

      function pushCommandHistory(command) {
        commandHistory.push(command);
        historyIndex = -1;
      }

      function executeCommand(cmd) {
        dispatchCommand(cmd);
        pushCommandHistory(cmd);
      }

      let navIndex = -1;
      let gStreak = 0;
      let gTimer;
      let activeCardIndex = -1;

      historyEl.tabIndex = 0;
      historyEl.setAttribute("aria-label", "Terminal history");
      historyEl.addEventListener("keydown", handleHistoryNav);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          input.focus();
        }
      });

      function focusHistory() {
        const cards = getEventCards();
        historyEl.focus();
        if (!cards.length) {
          return;
        }
        selectHistoryCard(cards.length - 1);
        cards[navIndex].scrollIntoView({ block: "center", behavior: "smooth" });
      }

      function handleHistoryNav(event) {
        const cards = getEventCards();
        if (!cards.length) {
          return;
        }
        if (event.key === "e" && selectedEvent) {
          event.preventDefault();
          startEditShortcut();
          return;
        }
        if (event.key === "Escape") {
          event.preventDefault();
          input.focus();
          return;
        }
        if (event.key === "Enter") {
          event.preventDefault();
          if (navIndex >= 0) {
            toggleEventDescription(navIndex);
          }
          return;
        }
        if (event.key === "Tab") {
          event.preventDefault();
          if (event.shiftKey) {
            input.focus();
            return;
          }
          return;
        }
        if (!["j", "k", "G", "g"].includes(event.key)) {
          resetGStreak();
          return;
        }
        event.preventDefault();
        if (["j", "k"].includes(event.key) && navIndex === -1) {
          navIndex = cards.length - 1;
        }
        if (event.key === "j") {
          navIndex = Math.max(0, navIndex - 1);
          selectHistoryCard(navIndex);
          return;
        }
        if (event.key === "k") {
          navIndex = Math.min(cards.length - 1, navIndex + 1);
          selectHistoryCard(navIndex);
          return;
        }
        if (event.key === "G" || (event.key === "g" && event.shiftKey)) {
          navIndex = cards.length - 1;
          selectHistoryCard(navIndex);
          return;
        }
        if (event.key === "g") {
          gStreak += 1;
          if (gStreak === 2) {
            navIndex = 0;
            selectHistoryCard(navIndex);
            resetGStreak();
            return;
          }
          if (gTimer) {
            clearTimeout(gTimer);
          }
          gTimer = setTimeout(() => resetGStreak(), 400);
        }
      }

      function resetGStreak() {
        gStreak = 0;
        if (gTimer) {
          clearTimeout(gTimer);
          gTimer = null;
        }
      }

      function cancelAddEvent() {
        pendingEvent = null;
        clearCalendarPicker();
      }

      function clearCalendarPicker() {
        if (calendarSelectorEl) {
          calendarSelectorEl.remove();
          calendarSelectorEl = null;
        }
      }

      function getEventCards() {
        return Array.from(historyEl.querySelectorAll(".event-card"));
      }

      function selectHistoryCard(index) {
        const cards = getEventCards();
        cards.forEach((card, i) => card.classList.toggle("selected", i === index));
        if (index >= 0 && index < cards.length) {
          navIndex = index;
          cards[index].scrollIntoView({ block: "center", behavior: "smooth" });
          selectedEvent = lastRenderedEvents[index] || null;
        } else {
          navIndex = -1;
          selectedEvent = null;
        }
        updateEditHint();
      }

      function toggleEventDescription(index) {
        const cards = getEventCards();
        if (!cards.length || index < 0 || index >= cards.length) {
          return;
        }
        if (activeCardIndex >= 0 && activeCardIndex < cards.length) {
          cards[activeCardIndex].classList.remove("expanded");
          if (activeCardIndex === index) {
            activeCardIndex = -1;
            selectedEvent = null;
            selectHistoryCard(-1);
            return;
          }
        }
        cards[index].classList.add("expanded");
        activeCardIndex = index;
        selectHistoryCard(index);
      }

      function moveHistory(direction) {
        const cards = getEventCards();
        if (!cards.length) {
          return;
        }
        historyEl.focus();
        if (navIndex === -1) {
          navIndex = cards.length - 1;
        }
        if (direction === "down") {
          navIndex = Math.max(0, navIndex - 1);
        } else {
          navIndex = Math.min(cards.length - 1, navIndex + 1);
        }
        selectHistoryCard(navIndex);
      }

      function restoreSelectionIfNeeded() {
        if (!pendingRestoreEventId) {
          return;
        }
        const cards = getEventCards();
        const index = cards.findIndex((card) => card.dataset.eventId === pendingRestoreEventId);
        if (index >= 0) {
          selectHistoryCard(index);
        }
        pendingRestoreEventId = null;
      }

      function jumpBottom() {
        const cards = getEventCards();
        if (!cards.length) {
          return;
        }
        navIndex = cards.length - 1;
        selectHistoryCard(navIndex);
      }

      function jumpTop() {
        const cards = getEventCards();
        if (!cards.length) {
          return;
        }
        navIndex = 0;
        selectHistoryCard(navIndex);
      }

      const toolbar = document.getElementById("mobile-toolbar");
      toolbar?.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) {
          return;
        }
        const action = button.dataset.shortcut;
        if (!action) {
          return;
        }
        handleShortcut(action);
      });

      function handleShortcut(action) {
        if (action === "ls" || ["w", "m"].includes(action)) {
          executeCommand(action);
          return;
        }
        if (action === "j") {
          moveHistory("down");
          return;
        }
        if (action === "k") {
          moveHistory("up");
          return;
        }
        if (action === "e") {
          startEditShortcut();
          return;
        }
        if (action === "a") {
          startAddShortcut();
          return;
        }
        if (action === "ESC") {
          input.focus();
          return;
        }
        if (action === "G") {
          jumpBottom();
          return;
        }
        if (action === "gg") {
          jumpTop();
          return;
        }
      }

      function startEditShortcut() {
        if (!selectedEvent) {
          return;
        }
        input.value = "e ";
        input.focus();
      }

      function updateEditHint() {
        if (!selectedEvent) {
          editHint.style.display = "none";
          updateEventFooter();
          return;
        }
        editHint.textContent = `Ready to edit event ${selectedEvent.id || "(unknown id)"}`;
        editHint.style.display = "block";
        updateEventFooter();
      }

      function getCurrentSelectedEvent() {
        if (selectedEvent) {
          return selectedEvent;
        }
        if (navIndex >= 0 && lastRenderedEvents[navIndex]) {
          return lastRenderedEvents[navIndex];

        return null;
      }

      function updateEventFooter() {
        if (!eventFooter) {
          return;
        }
        const eventInfo = getCurrentSelectedEvent();
        if (!eventInfo) {
          eventFooter.textContent = "No event selected.";
          return;
        }
        const start = getEventDateTime(eventInfo, "start");
        const timeText = start
          ? start.toLocaleString(undefined, {
              weekday: "short",
              month: "short",
              day: "2-digit",
              hour: eventInfo.start?.dateTime ? "2-digit" : undefined,
              minute: eventInfo.start?.dateTime ? "2-digit" : undefined,

          : "";
        eventFooter.textContent = `${eventInfo.summary || "Untitled"}${timeText ? ` · ${timeText}` : ""}`;

      function startAddShortcut() {

      }

      function getCalendarTintClass(calendarId) {
        if (!calendarId) {
          return "";
        }
        if (!calendarTintMap.has(calendarId)) {
          const nextIndex = calendarTintMap.size % tintCount;
          calendarTintMap.set(calendarId, nextIndex);

        const idx = calendarTintMap.get(calendarId);

      function escapeHtml(value) {

      function formatPromptTime() {
        const now = new Date();
        const isMobile = window.innerWidth <= 640;
        if (isMobile) {

          const month = now
            .toLocaleString(undefined, { month: "short" })
            .toUpperCase();
          return `${day}-${month}`;
        }
        return now.toLocaleString(undefined, {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function updatePrompt() {

      function handleAuth() {
        const storedId = getStoredClientId();
        if (!storedId) {
          promptForClientId();
          return;
        }
        const storedSecret = getStoredClientSecret();
        if (!storedSecret) {
          promptForClientSecret();
          return;
        }
        startAuthFlow();
      }

      function promptForClientId() {
        const stored = getStoredClientId();
        awaitingClientId = true;
        awaitingClientSecret = false;
        const message = stored
          ? "Press Enter to reuse the saved Client ID or paste a new one."
          : "Paste your Google OAuth Client ID and press Enter.";
        addHistoryLine("log", `<span class='tag'>clientid></span> ${message}`);
        input.placeholder = stored
          ? "Client ID or Enter to reuse"
          : "Paste Client ID";

      }

      function promptForClientSecret() {
        const stored = getStoredClientSecret();
        awaitingClientSecret = true;
        awaitingClientId = false;
        const message = stored
          ? "Press Enter to reuse the saved Client Secret or paste a new one."
          : "Paste your Google OAuth Client Secret (if required) and press Enter.";
        addHistoryLine("log", `<span class='tag'>clientsecret></span> ${message}`);
        input.placeholder = stored
          ? "Client secret or Enter to reuse"
          : "Paste Client secret";
        input.focus();
      }

      function handleClientSecretInput(value) {
        const trimmed = value.trim();
        awaitingClientSecret = false;
        input.placeholder = defaultPlaceholder;
        const stored = getStoredClientSecret();
        if (!trimmed) {
          if (!stored) {
            addHistoryLine("error", "No Client Secret stored yet. Paste it now to continue.");
            return;
          }
          addHistoryLine("log", "Using saved Client Secret.");
        } else {
          saveClientSecret(trimmed);
          addHistoryLine("log", "Client Secret saved locally.");
        }
        startAuthFlow();
      }

      async function initiatePkceFlow() {
        const verifier = generateVerifier(64);
        localStorage.setItem(VERIFIER_KEY, verifier);
        const challenge = await pkceChallenge(verifier);
        const state = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
        localStorage.setItem(STATE_KEY, state);
        const authUrl = new URL("https://accounts.google.com/o/oauth2/v2/auth");
        const clientId = getStoredClientId();
        if (!clientId) {
          throw new Error("Client ID not set. Run auth and paste it when prompted.");
        }
        authUrl.searchParams.set("client_id", clientId);
        authUrl.searchParams.set("redirect_uri", redirectUri);
        authUrl.searchParams.set("response_type", "code");
        authUrl.searchParams.set("scope", SCOPE);
        authUrl.searchParams.set("access_type", "offline");
        authUrl.searchParams.set("include_granted_scopes", "true");
        authUrl.searchParams.set("prompt", "consent");
        authUrl.searchParams.set("code_challenge", challenge);
        authUrl.searchParams.set("code_challenge_method", "S256");
        authUrl.searchParams.set("state", state);
        addHistoryLine("log", "Opening Google auth & redirecting...");
        window.location.href = authUrl.toString();
      }

      function handleOAuthCallback() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");
        const error = params.get("error");
        if (error) {
          addHistoryLine("error", `OAuth error: ${error}`);
          cleanUrl();
          return;
        }
        if (!code) {
          return;
        }
        const savedState = localStorage.getItem(STATE_KEY);
        if (!savedState || state !== savedState) {
          addHistoryLine("error", "OAuth state mismatch.");
          cleanUrl();
          return;
        }
        const verifier = localStorage.getItem(VERIFIER_KEY);
        if (!verifier) {
          addHistoryLine("error", "Missing PKCE verifier.");
          cleanUrl();
          return;
        }
        exchangeCodeForToken(code, verifier)
          .then(() => {
            addHistoryLine("log", "Authentication complete. You can now use other commands.");
            renderStartupMessage();
          })
          .catch((err) => {
            addHistoryLine("error", `Token exchange failed: ${err.message}`);
          })
          .finally(() => {
            cleanUrl();
          });
      }

      function cleanUrl() {
        window.history.replaceState({}, document.title, redirectUri);
      }

      async function exchangeCodeForToken(code, verifier) {
        const clientId = getStoredClientId();
        if (!clientId) {
          throw new Error("Client ID missing during token swap.");
        }
        const body = new URLSearchParams({
          client_id: clientId,
          code,
          grant_type: "authorization_code",
          redirect_uri: redirectUri,
          code_verifier: verifier,
        });
        const clientSecret = getStoredClientSecret();
        if (clientSecret) {
          body.set("client_secret", clientSecret);
        }
        const response = await fetch("https://oauth2.googleapis.com/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });
        const tokens = await response.json();
        if (!response.ok) {
          const description = tokens.error_description
            ? ` ${tokens.error_description}`
            : "";
          throw new Error(`HTTP ${response.status} ${tokens.error || ""}${description}`.trim());
        }
        if (tokens.error) {
          throw new Error(tokens.error);
        }
        const payload = {
          access_token: tokens.access_token,
          refresh_token: tokens.refresh_token || null,
          expires_at: Date.now() + tokens.expires_in * 1000 - 30_000,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }


      function getStoredTokens() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return null;
        }
        try {
          return JSON.parse(raw);
        } catch (error) {
          return null;
        }
      }

      function getStoredClientId() {
        return localStorage.getItem(CLIENT_ID_KEY);
      }

      function saveClientId(value) {
        localStorage.setItem(CLIENT_ID_KEY, value);
      }

      function getStoredClientSecret() {
        return localStorage.getItem(CLIENT_SECRET_KEY);
      }

      function saveClientSecret(value) {
        localStorage.setItem(CLIENT_SECRET_KEY, value);
      }

      async function ensureAccessToken() {
        const stored = getStoredTokens();
        if (!stored) {
          throw new Error("Not authenticated yet. Run auth.");
        }
        if (stored.expires_at > Date.now()) {
          return stored.access_token;
        }
        if (!stored.refresh_token) {
          throw new Error("Refresh token missing. Re-run auth with prompt=consent.");
        }
        const refreshed = await refreshAccessToken(stored.refresh_token);
        return refreshed.access_token;
      }

      function showHelp() {
        const helpLines = [
          "<strong>help</strong> – repeat this command list",
          "<strong>auth</strong> – prompt for your Client ID and optional secret, then run the PKCE flow",
          "<strong>status</strong> – display whether the shell is authenticated",
          "<strong>ls</strong>/<strong>w</strong>/<strong>m</strong>/<strong>+1</strong>/<strong>+2</strong> – query events across every calendar for the requested range",
          "<strong>DD</strong>/<strong>MMDD</strong>/<strong>YYMMDD</strong>/<strong>YYYYMMDD</strong> – inspect an arbitrary day",
          "<strong>cals</strong> – list the calendars the token can read",
          "<strong>e</strong> + date/time/duration/title – edit the highlighted event with the new values",
          "<strong>a</strong> + date/time/duration + title – add a quick event (e.g., `a 271225 Christmas`, `a 07 14 1 Coffee`)",
          "<strong>upgrade</strong> – refresh the app to / to pull the latest PWA revision",
          "<strong>clear</strong> – wipe the current console output",
          "Register a Google OAuth client that allows both http://localhost and https://cal-term.com as redirect URIs.",
          "Tip: prompt lines show the date/time you sent a command, so you can correlate events with the shell history."
        ];
        helpLines.forEach((line) => addHistoryLine("system", line));
      }

      function clearHistory() {
        historyEl.innerHTML = "";
        navIndex = -1;
        activeCardIndex = -1;
        addHistoryLine("system", "Screen cleared. Type <span class='tag'>help</span> for available commands.");
        eventFooter.textContent = "No event selected.";
      }

      function showStatus() {
        const stored = getStoredTokens();
        const hasId = !!getStoredClientId();
        const hasSecret = !!getStoredClientSecret();
        if (stored && stored.access_token) {
          addHistoryLine("system", `Authenticated until ${new Date(stored.expires_at).toLocaleString()}.`);
          return;
        }
        const pieces = [];
        pieces.push(hasId ? "Client ID saved" : "Client ID missing");
        pieces.push(hasSecret ? "Client secret saved" : "Client secret missing");
        addHistoryLine("system", `Unauthenticated (${pieces.join(", ")}).`);
      }

      function hasValidToken() {
        const stored = getStoredTokens();
        return !!(stored && stored.access_token && stored.expires_at > Date.now());
      }

      function renderStartupMessage() {
        if (hasValidToken()) {
        addHistoryLine("system", "Type <span class='tag'>help</span> for assistance.");
        return;
      }
        addHistoryLine("system", "Type <span class='tag'>auth</span> to begin.");
      }

      async function refreshAccessToken(refreshToken) {
        const clientId = getStoredClientId();
        if (!clientId) {
          throw new Error("Client ID missing during token refresh.");
        }
        const body = new URLSearchParams({
          client_id: clientId,
          grant_type: "refresh_token",
          refresh_token: refreshToken,
        });
        const clientSecret = getStoredClientSecret();
        if (clientSecret) {
          body.set("client_secret", clientSecret);
        }
        const response = await fetch("https://oauth2.googleapis.com/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });
        const tokens = await response.json();
        if (!response.ok) {
          const description = tokens.error_description
            ? ` ${tokens.error_description}`
            : "";
          throw new Error(`Failed to refresh token (${response.status}) ${tokens.error || ""}${description}`.trim());
        }
        const stored = getStoredTokens();
        const payload = {
          access_token: tokens.access_token,
          refresh_token: stored ? stored.refresh_token : refreshToken,
          expires_at: Date.now() + tokens.expires_in * 1000 - 30_000,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        return payload;
      }

      function rangeToday() {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const end = new Date(start);
        end.setDate(end.getDate() + 1);
        return { start, end };
      }

      function rangeNextDays(days) {
        const start = new Date();
        start.setHours(0, 0, 0, 0);
        const end = new Date(start);
        end.setDate(end.getDate() + days);
        return { start, end };
      }

      function rangeMonth(offsetMonths) {
        const now = new Date();
        const month = now.getMonth() + offsetMonths;
        const start = new Date(now.getFullYear(), month, 1);
        const end = new Date(start);
        end.setMonth(end.getMonth() + 1);
        return { start, end };
      }

      function rangeSingleDay(date) {
        const start = new Date(date);
        const end = new Date(start);
        end.setDate(end.getDate() + 1);
        return { start, end };
      }

      function formatDate(date) {
        return `${String(date.getFullYear()).slice(-2)}${String(date.getMonth() + 1).padStart(2, "0")}${String(date.getDate()).padStart(2, "0")}`;
      }

      function handleDateLookup(raw) {
        const candidate = parseFlexibleDate(raw);
        if (!candidate) {
          addHistoryLine("error", "Supply DD, MMDD, YYMMDD, or YYYYMMDD to inspect a day.");
          return;
        }
        const label = `Am I busy ${candidate.toLocaleDateString(undefined, { month: "short", day: "2-digit", year: "numeric" })}`;
        fetchEventsRange(label, rangeSingleDay(candidate));
      }

      async function handleAddCommand(payload) {
        const tokens = payload.split(/\s+/).filter(Boolean);
        if (!tokens.length) {
          addHistoryLine("error", "Usage: a <date> [time] [duration] <title>");
          return;
        }
        const dateToken = tokens[0];
        const timeCandidate = tokens[1];
        let timeToken = null;
        let durationToken = null;
        let idx = 1;
        if (timeCandidate && /^[0-9]+$/.test(timeCandidate)) {
          timeToken = timeCandidate;
          idx += 1;
        }
        if (timeToken && tokens[idx] && /^[0-9]+(\.[0-9]+)?$/.test(tokens[idx])) {
          durationToken = tokens[idx];
          idx += 1;
        }
        const title = tokens.slice(idx).join(" ") || "Untitled event";
        const date = parseFlexibleDate(dateToken);
        if (!date) {
          addHistoryLine("error", "Invalid date format; please use DD, MMDD, YYMMDD, or YYYYMMDD.");
          return;
        }
        const timeParts = timeToken ? parseTimeToken(timeToken) : null;
        if (timeToken && !timeParts) {
          addHistoryLine("error", "Time must be between 0000 and 2359.");
          return;
        }
        const durationHours = timeParts
          ? durationToken
            ? parseFloat(durationToken)
            : 1
          : 0;
        if (timeParts && (!durationHours || durationHours <= 0)) {
          addHistoryLine("error", "Duration must be a positive number of hours.");
          return;
        }
        const label = `${title} on ${date.toLocaleDateString(undefined, {
          month: "short",
          day: "2-digit",
          year: "numeric",
        })}`;
        pendingEvent = {
          date,
          time: timeParts,
          durationHours,
          title,
          label,
          allDay: !timeParts,
        };
        addHistoryLine("log", `Preparing to add ${pendingEvent.label}. Choose a calendar.`);
        try {
          const token = await ensureAccessToken();
          const calendars = await fetchCalendarList(token);
          if (!calendars.length) {
            addHistoryLine("error", "No calendars available to add events.");
            pendingEvent = null;
            return;
          }
          renderCalendarPicker(calendars);
        } catch (error) {
          addHistoryLine("error", `Unable to prepare event: ${error.message}`);
          pendingEvent = null;
        }
      }

      function handleUpgrade() {
        const randomToken = Math.floor(Math.random() * 1_000_000_000);
        addHistoryLine("log", "Upgrading app and refreshing with new version token...");
        window.location.href = `/?v=${randomToken}`;
      }

      function renderCalendarPicker(calendars) {
        clearCalendarPicker();
        if (!pendingEvent) {
          return;
        }
        const container = document.createElement("div");
        container.className = "calendar-picker";
        const label = document.createElement("div");
        label.className = "calendar-picker-label";
        label.innerHTML = `Select a calendar for <strong>${escapeHtml(pendingEvent.title)}</strong> (${escapeHtml(
          pendingEvent.label
        )})`;
        container.appendChild(label);
        const row = document.createElement("div");
        row.className = "calendar-pill-row";
        calendars.forEach((calendar) => {
          const pill = document.createElement("button");
          pill.type = "button";
          pill.className = "calendar-pill";
          pill.textContent = calendar.summary || calendar.id;
          pill.addEventListener("click", () => createCalendarEvent(calendar));
          row.appendChild(pill);
        });
        container.appendChild(row);
        historyEl.appendChild(container);
        container.scrollIntoView({ behavior: "smooth" });
        calendarSelectorEl = container;
      }

      async function createCalendarEvent(calendar) {
        if (!pendingEvent) {
          addHistoryLine("error", "No event is pending creation.");
          return;
        }
        try {
          const payload = buildEventPayload(pendingEvent);
          const token = await ensureAccessToken();
          const response = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendar.id)}/events`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            }
          );
          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            const description = data.error?.message ? ` ${data.error.message}` : "";
            throw new Error(`HTTP ${response.status}${description}`.trim());
          }
          addHistoryLine("system", `Event "${escapeHtml(pendingEvent.title)}" added to ${escapeHtml(
            calendar.summary || calendar.id
          )}.`);
          pendingEvent = null;
          clearCalendarPicker();
        } catch (error) {
          addHistoryLine("error", `Failed to add event: ${error.message}`);
        }
      }

      function buildEventPayload(event) {
        const payload = {
          summary: event.title,
        };
        if (event.allDay) {
          const startDate = formatIsoDay(event.date);
          const endDate = new Date(event.date);
          endDate.setDate(endDate.getDate() + 1);
          payload.start = { date: startDate };
          payload.end = { date: formatIsoDay(endDate) };
        } else {
          const start = new Date(event.date);
          start.setHours(event.time.hours);
          start.setMinutes(event.time.minutes);
          start.setSeconds(0);
          start.setMilliseconds(0);
          const end = new Date(start);
          end.setMinutes(end.getMinutes() + event.durationHours * 60);
          payload.start = { dateTime: start.toISOString() };
          payload.end = { dateTime: end.toISOString() };
        }
        return payload;
      }

      function formatIsoDay(date) {
        return date.toISOString().slice(0, 10);
      }

      function handleEditCommand(payload) {
        const eventToEdit = getCurrentSelectedEvent();
        if (!eventToEdit || !eventToEdit.id) {
          addHistoryLine("error", "Select an event (click or Enter) before editing.");
          return;
        }
        const tokens = payload.split(/\s+/).filter(Boolean);
        if (!tokens.length) {
          addHistoryLine("error", "Usage: e <date?> <time?> <duration?> <title?>");
          return;
        }
        let idx = 0;
        let dateToken = null;
        let timeToken = null;
        let durationToken = null;
        const isDateCandidate = (token) => token === "-" || /^[0-9]{1,8}$/.test(token);
        const isTimeCandidate = (token) => token === "-" || /^[0-9]{1,4}$/.test(token);
        const isDurationCandidate = (token) => /^[0-9]+(\.[0-9]+)?$/.test(token);
        if (isDateCandidate(tokens[0])) {
          dateToken = tokens[0];
          idx += 1;
          if (tokens[idx] && isTimeCandidate(tokens[idx])) {
            timeToken = tokens[idx];
            idx += 1;
          }
          if (tokens[idx] && isDurationCandidate(tokens[idx])) {
            durationToken = tokens[idx];
            idx += 1;
          }
        }
        const title = tokens.slice(idx).join(" ").trim();
        const dateValue = dateToken && dateToken !== "-" ? parseFlexibleDate(dateToken) : null;
        const timeValue = timeToken && timeToken !== "-" ? parseTimeToken(timeToken) : null;
        const durationValue = durationToken && durationToken !== "-" ? parseFloat(durationToken) : null;
        const titleValue = title.length ? title : null;
        performEventEdit({ date: dateValue, time: timeValue, duration: durationValue, title: titleValue });
      }

      function getEventDateTime(event, key) {
        if (!event || !event[key]) {
          return null;
        }
        const value = event[key];
        if (value.dateTime) {
          return new Date(value.dateTime);
        }
        if (value.date) {
          return new Date(`${value.date}T00:00:00`);
        }
        return null;
      }

      function getCurrentSelectedEvent() {
        if (selectedEvent) {
          return selectedEvent;
        }
        if (navIndex >= 0 && lastRenderedEvents[navIndex]) {
          return lastRenderedEvents[navIndex];
        }
        return null;
      }

      async function performEventEdit(updates) {
        const eventToEdit = getCurrentSelectedEvent();
        if (!eventToEdit || !eventToEdit.id) {
          return;
        }
        const tokenPromise = ensureAccessToken();
        const start = getEventDateTime(eventToEdit, "start");
        const end = getEventDateTime(eventToEdit, "end");
        if (!start || !end) {
          addHistoryLine("error", "Cannot determine the selected event's time.");
          return;
        }
        const originalDuration = end.getTime() - start.getTime();
        const isAllDay = !!eventToEdit.start?.date && !eventToEdit.start?.dateTime;
        let newStart = new Date(start.getTime());
        if (updates.date) {
          newStart.setFullYear(updates.date.getFullYear(), updates.date.getMonth(), updates.date.getDate());
        }
        let targetAllDay = isAllDay && !updates.time;
        if (updates.time) {
          newStart.setHours(updates.time.hours, updates.time.minutes, 0, 0);
          targetAllDay = false;
        }
        let durationMs = originalDuration;
        if (updates.duration) {
          durationMs = updates.duration * 60 * 60 * 1000;
          targetAllDay = false;
        }
        if (durationMs <= 0) {
          durationMs = 60 * 60 * 1000;
        }
        const newEnd = targetAllDay
          ? (() => {
              const dayEnd = new Date(newStart.getTime());
              dayEnd.setDate(dayEnd.getDate() + 1);
              return dayEnd;
            })()
          : new Date(newStart.getTime() + durationMs);
        const payload = { summary: updates.title || eventToEdit.summary };
        if (targetAllDay) {
          payload.start = { date: formatIsoDay(newStart) };
          payload.end = { date: formatIsoDay(newEnd) };
        } else {
          payload.start = { dateTime: newStart.toISOString() };
          payload.end = { dateTime: newEnd.toISOString() };
        }
        try {
          const token = await tokenPromise;
          const calendarId = eventToEdit.calendarId || "primary";
          const response = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(
              calendarId
            )}/events/${encodeURIComponent(eventToEdit.id)}`,
            {
              method: "PATCH",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            }
          );
          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            const description = data.error?.message ? ` ${data.error.message}` : "";
            throw new Error(`HTTP ${response.status}${description}`.trim());
          }
          addHistoryLine(
            "system",
            `Event "${escapeHtml(payload.summary)}" updated. Reloading day...`
          );
          pendingRestoreEventId = eventToEdit.id;
          fetchEventsRange(
            `Updated ${newStart.toLocaleDateString(undefined, { month: "short", day: "2-digit", year: "numeric" })}`,
            rangeSingleDay(newStart)
          );
        } catch (error) {
          addHistoryLine("error", `Failed to edit event: ${error.message}`);
        }
      }

      function parseFlexibleDate(token) {
        const digits = token.trim();
        if (!digits || !/^[0-9]+$/.test(digits)) {
          return null;
        }
        const now = new Date();
        let year = now.getFullYear();
        let month = now.getMonth() + 1;
        let day = null;
        if (digits.length <= 2) {
          day = parseInt(digits, 10);
        } else if (digits.length === 4) {
          month = parseInt(digits.slice(0, 2), 10);
          day = parseInt(digits.slice(2), 10);
        } else if (digits.length === 6) {
          year = 2000 + parseInt(digits.slice(0, 2), 10);
          month = parseInt(digits.slice(2, 4), 10);
          day = parseInt(digits.slice(4), 10);
        } else if (digits.length === 8) {
          year = parseInt(digits.slice(0, 4), 10);
          month = parseInt(digits.slice(4, 6), 10);
          day = parseInt(digits.slice(6), 10);
        } else {
          return null;
        }
        if (!day || day < 1 || !month || month < 1 || month > 12) {
          return null;
        }
        const candidate = new Date(year, month - 1, day);
        if (
          candidate.getFullYear() !== year ||
          candidate.getMonth() !== month - 1 ||
          candidate.getDate() !== day
        ) {
          return null;
        }
        return candidate;
      }

      function parseTimeToken(token) {
        if (!token || !/^[0-9]+$/.test(token)) {
          return null;
        }
        const digits = token;
        let hours;
        let minutes;
        if (digits.length <= 2) {
          hours = parseInt(digits, 10);
          minutes = 0;
        } else {
          hours = parseInt(digits.slice(0, -2), 10);
          minutes = parseInt(digits.slice(-2), 10);
        }
        if (
          Number.isNaN(hours) ||
          Number.isNaN(minutes) ||
          hours < 0 ||
          hours > 23 ||
          minutes < 0 ||
          minutes > 59
        ) {
          return null;
        }
        return { hours, minutes };
      }

      async function fetchEventsRange(label, { start, end }) {
        addHistoryLine("log", `Querying ${label} across all calendars…`);
        try {
          const token = await ensureAccessToken();
          const calendars = await fetchCalendarList(token);
          if (!calendars.length) {
            addHistoryLine("log", "No calendars available.");
            return;
          }
          const events = [];
          await Promise.all(
            calendars.map(async (calendar) => {
              const params = new URLSearchParams({
                timeMin: start.toISOString(),
                timeMax: end.toISOString(),
                singleEvents: "true",
                orderBy: "startTime",
                maxResults: "40",
              });
              try {
                const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(
                  calendar.id
                )}/events?${params.toString()}`, {
                  headers: {
                    Authorization: `Bearer ${token}`,
                  },
                });
                if (!response.ok) {
                  throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                (payload.items || []).forEach((event) => {
                  events.push({
                    ...event,
                    calendarName: calendar.summary || calendar.id,
                    calendarId: calendar.id,
                  });
                });
              } catch (error) {
                addHistoryLine(
                  "error",
                  `Calendar ${calendar.summary || calendar.id}: ${error.message}`
                );
              }
            })
          );
          if (!events.length) {
            addHistoryLine("log", `${label}: No events found.`);
            return;
          }
          events.sort((a, b) => new Date(getEventTime(a)).valueOf() - new Date(getEventTime(b)).valueOf());
          renderEvents(label, events);
        } catch (error) {
          addHistoryLine("error", error.message);
        }
      }

      async function listCalendars() {
        addHistoryLine("log", "Fetching connected calendars…");
        try {
          const token = await ensureAccessToken();
          const calendars = await fetchCalendarList(token);
          if (!calendars.length) {
            addHistoryLine("log", "No calendars available.");
            return;
          }
          calendars.forEach((calendar) => {
            addHistoryLine(
              "system",
              `<span class="pill">${escapeHtml(calendar.summary || calendar.id)}</span> ${escapeHtml(calendar.id)}`
            );
          });
        } catch (error) {
          addHistoryLine("error", error.message);
        }
      }

      async function fetchCalendarList(token) {
        const response = await fetch(
          "https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=reader&maxResults=250",
          {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          }
        );
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          const description = payload.error_description ? ` ${payload.error_description}` : "";
          throw new Error(`Calendar list failed (${response.status}) ${payload.error || ""}${description}`.trim());
        }
        const data = await response.json();
        return data.items || [];
      }

      function getEventTime(event) {
        return event.start?.dateTime || event.start?.date || new Date().toISOString();
      }

      function clearEventOutput() {
        Array.from(historyEl.querySelectorAll(".event-card, .day-divider, .calendar-picker")).forEach((el) => el.remove());
      }

      function renderEvents(label, events) {
        if (!events.length) {
          addHistoryLine("log", `${label}: No events found.`);
          return;
        }
        clearEventOutput();
        activeCardIndex = -1;
        const sorted = [...events].sort((a, b) => new Date(getEventTime(a)).valueOf() - new Date(getEventTime(b)).valueOf());
        lastRenderedEvents = sorted;
        let currentDay = "";
        sorted.forEach((event) => {
          const startStamp = new Date(getEventTime(event));
          const dayKey = startStamp.toDateString();
          if (dayKey !== currentDay) {
            currentDay = dayKey;
            const divider = document.createElement("div");
            divider.className = "day-divider";
            divider.textContent = startStamp.toLocaleDateString(undefined, {
              weekday: "long",
              month: "short",
              day: "2-digit",
            });
            historyEl.appendChild(divider);
          }
          const card = document.createElement("div");
          card.className = "event-card";
          if (event.id) {
            card.dataset.eventId = event.id;
          }
          const tintClass = getCalendarTintClass(event.calendarId || event.calendarName);
          if (tintClass) {
            card.classList.add(tintClass);
          }
          card.addEventListener("click", () => {
          const cards = getEventCards();
          const index = cards.indexOf(card);
          toggleEventDescription(index);
        });
          const start = event.start?.dateTime || event.start?.date;
          const end = event.end?.dateTime || event.end?.date;
          const calendarTag = event.calendarName
            ? `<div class="pill">${escapeHtml(event.calendarName)}</div>`
            : "";
          card.innerHTML = `
            ${calendarTag}
            <div class="event-title">${escapeHtml(event.summary || "(No title)")}</div>
            <div class="event-time">${formatEventTime(start, end)}</div>
            ${event.description ? `<div class="event-desc">${escapeHtml(event.description)}</div>` : ""}
          `;
          historyEl.appendChild(card);
        });
        historyEl.scrollTop = historyEl.scrollHeight;
        if (pendingFocusHistory > 0) {
          pendingFocusHistory -= 1;
          focusHistory();
        }
        restoreSelectionIfNeeded();
        updateEventFooter();
      }

      function formatEventTime(start, end) {
        if (!start) return "Time not provided";
        const startDate = new Date(start);
        const endDate = end ? new Date(end) : null;
        const options = { hour: "2-digit", minute: "2-digit" };
        let text = `${startDate.toLocaleDateString()} ${startDate.toLocaleTimeString(undefined, options)}`;
        if (endDate) {
          text += ` – ${endDate.toLocaleTimeString(undefined, options)}`;
        }
        return text;
      }

      function parseYYMMDD(value) {
        const year = parseInt(value.slice(0, 2), 10);
        const month = parseInt(value.slice(2, 4), 10);
        const day = parseInt(value.slice(4, 6), 10);
        const fullYear = year + 2000;
        const date = new Date(fullYear, month - 1, day);
        if (date.getFullYear() !== fullYear || date.getMonth() !== month - 1 || date.getDate() !== day) {
          return null;
        }
        return date;
      }

      function generateVerifier(length) {
        const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
        let result = "";
        const random = crypto.getRandomValues(new Uint8Array(length));
        random.forEach((value) => {
          result += charset[value % charset.length];
        });
        return result;
      }

      async function pkceChallenge(verifier) {
        const encoder = new TextEncoder();
        const data = encoder.encode(verifier);
        const digest = await crypto.subtle.digest("SHA-256", data);
        return btoa(String.fromCharCode(...new Uint8Array(digest)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .catch((error) => console.warn("Service worker registration failed", error));
        });
      }
    </script>
  </body>
